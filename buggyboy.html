<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>BuggyBoy</title>
<style>
  body { margin:0; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:monospace; }
  canvas { display:block; border:2px solid #333; image-rendering:pixelated; }
  #hint { color:#666; font-size:12px; margin-top:8px; }
</style>
</head>
<body>
<canvas id="c" width="640" height="640"></canvas>
<div id="hint">Frecce / WASD: guida &nbsp;|&nbsp; Su: accelera &nbsp;|&nbsp; Giù: frena &nbsp;|&nbsp; 1-4: inizia con difficoltà</div>
<script>
'use strict';

// ─── COSTANTI ────────────────────────────────────────────────────────────────
const W = 640, H = 640;
const ROAD_W = 280, GRAVEL = 12, STEP = 4;
const PL_W = 36, PL_H = 52, MAX_SPD = 620;
const ST = { HS:0, PLAY:1, NAME:2 };
const PH = { PLAY:0, CRASH:1, OVER:2 };
const HS_KEY = 'buggyboy_v1';

// ─── AUDIO (Web Audio API sintetico) ─────────────────────────────────────────
class Audio {
  constructor() { this.ctx = null; this.engGain = null; this.engOsc = null; }

  _init() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  }

  startEngine() {
    this._init();
    this.stopEngine();
    this.engGain = this.ctx.createGain();
    this.engGain.gain.value = 0.12;
    const dist = this.ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) curve[i] = ((i/128)-1)**3;
    dist.curve = curve;
    this.engOsc = this.ctx.createOscillator();
    this.engOsc.type = 'sawtooth';
    this.engOsc.frequency.value = 50;
    this.engOsc.connect(dist);
    dist.connect(this.engGain);
    this.engGain.connect(this.ctx.destination);
    this.engOsc.start();
  }

  updateSpeed(s) {
    if (!this.engOsc) return;
    this.engOsc.frequency.setTargetAtTime(40 + (s/MAX_SPD)*130, this.ctx.currentTime, 0.08);
  }

  stopEngine() {
    if (this.engOsc) { try { this.engOsc.stop(); } catch(e){} this.engOsc = null; }
    if (this.engGain) { this.engGain.disconnect(); this.engGain = null; }
  }

  _beep(freq, dur, vol, type='sine', slide=0) {
    if (!this.ctx) return;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.value = freq;
    if (slide) o.frequency.linearRampToValueAtTime(freq+slide, this.ctx.currentTime+dur);
    g.gain.setValueAtTime(vol, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(); o.stop(this.ctx.currentTime+dur);
  }

  _noise(dur, vol) {
    if (!this.ctx) return;
    const buf = this.ctx.createBuffer(1, this.ctx.sampleRate*dur, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random()*2-1;
    const src = this.ctx.createBufferSource(), g = this.ctx.createGain();
    g.gain.setValueAtTime(vol, this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime+dur);
    src.buffer = buf; src.connect(g); g.connect(this.ctx.destination); src.start();
  }

  playCrash()      { this._noise(0.6, 0.5); this._beep(60, 0.5, 0.3, 'sawtooth'); }
  playSlide()      { this._beep(180, 0.5, 0.18, 'sine', -60); }
  playSplash()     { this._noise(0.3, 0.25); this._beep(350, 0.25, 0.15, 'sine'); }
  playTick()       { this._beep(900, 0.08, 0.3, 'square'); }
  playCheckpoint() { this._beep(660, 0.12, 0.3, 'sine'); this._beep(880, 0.2, 0.3, 'sine'); }
  playCollect()    { this._beep(660, 0.1, 0.2, 'sine', 220); }
  playJump()       { this._beep(330, 0.2, 0.2, 'sine', 200); }
  playBonus()      { [880,1100,1320].forEach((f,i)=>setTimeout(()=>this._beep(f,0.15,0.35,'sine'),i*100)); }
}

// ─── UTILITY ─────────────────────────────────────────────────────────────────
function lcg(seed) {
  let s = seed >>> 0;
  return () => { s = (Math.imul(s,1664525)+1013904223)>>>0; return s/4294967296; };
}

function hsvToRgb(h,s,v) {
  const hi = Math.floor(h/60)%6, f=h/60-Math.floor(h/60);
  const p=v*(1-s), q=v*(1-f*s), t=v*(1-(1-f)*s);
  const lut=[[v,t,p],[q,v,p],[p,v,t],[p,q,v],[t,p,v],[v,p,q]];
  return lut[hi].map(x=>Math.round(x*255));
}

function rcol(r,g,b,a=1) { return a<1?`rgba(${r},${g},${b},${a})`:`rgb(${r},${g},${b})`; }
function ac(c,a) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }
function lighten(c,n) { return c.map(x=>Math.min(255,x+n)); }
function darken(c,n)  { return c.map(x=>Math.max(0,x-n)); }
function ri(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }

function poly(ctx, pts) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  for (let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.closePath();
}

function ellipse(ctx,x,y,w,h) {
  ctx.beginPath();
  ctx.ellipse(x+w/2,y+h/2,Math.max(0.1,w/2),Math.max(0.1,h/2),0,0,Math.PI*2);
}

function rectsHit(a,b) {
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

// ─── ROAD ────────────────────────────────────────────────────────────────────
class Road {
  constructor(rng) {
    this.a1=55+rng()*45; this.a2=15+rng()*25;
    this.p1=2800+rng()*2200; this.p2=900+rng()*700;
    this.f1=rng()*Math.PI*2; this.f2=rng()*Math.PI*2;
    this.scroll=0; this.dist=0;
  }

  _curve(d) {
    const off = this.a1*Math.sin(d/this.p1+this.f1) + this.a2*Math.sin(d/this.p2+this.f2);
    const max = (W-ROAD_W)/2 - 20;
    return Math.max(-max,Math.min(max,off));
  }

  centerAt(sy) {
    return W/2 + this._curve(this.dist + (H-100-sy));
  }

  update(dt,spd) { this.scroll=(this.scroll+spd*dt)%240; this.dist+=spd*dt; }

  edgesAt(sy) { const cx=this.centerAt(sy); return {l:cx-ROAD_W/2, r:cx+ROAD_W/2}; }
  edges()     { return this.edgesAt(H-100); }

  onRoad(b) {
    const {l,r}=this.edges();
    return b.x>=l+10 && b.x+b.w<=r-10;
  }

  draw(ctx) {
    const rows = Math.ceil(H/STEP)+2;
    const cx = new Float32Array(rows);
    for (let i=0;i<rows;i++) cx[i]=this.centerAt(i*STEP);

    ctx.fillStyle=rcol(34,120,34); ctx.fillRect(0,0,W,H);
    ctx.fillStyle=rcol(45,145,45);
    for (let y=-40+this.scroll%80;y<H+40;y+=80) ctx.fillRect(0,y,W,40);

    for (let i=0;i<rows-1;i++) {
      const y=i*STEP, le=cx[i]-ROAD_W/2, re=cx[i]+ROAD_W/2, sh=STEP+1;
      ctx.fillStyle=rcol(88,88,88);   ctx.fillRect(le,y,ROAD_W,sh);
      ctx.fillStyle=rcol(148,128,98); ctx.fillRect(le,y,GRAVEL,sh);
      ctx.fillStyle=rcol(148,128,98); ctx.fillRect(re-GRAVEL,y,GRAVEL,sh);
    }

    const drawLine = (pts) => {
      ctx.beginPath();
      pts.forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));
      ctx.stroke();
    };
    ctx.strokeStyle='white'; ctx.lineWidth=2;
    drawLine(Array.from({length:rows},(_,i)=>[cx[i]-ROAD_W/2+GRAVEL,i*STEP]));
    drawLine(Array.from({length:rows},(_,i)=>[cx[i]+ROAD_W/2-GRAVEL,i*STEP]));

    const phase=this.scroll%60;
    ctx.strokeStyle='yellow'; ctx.lineWidth=3;
    for (let i=0;i<rows-1;i++) {
      const y=i*STEP, yRel=((y-phase)%60+60)%60;
      if (yRel>=30) continue;
      ctx.beginPath(); ctx.moveTo(cx[i],y); ctx.lineTo(cx[i+1],y+STEP); ctx.stroke();
    }
  }
}

// ─── PLAYER ──────────────────────────────────────────────────────────────────
class Player {
  constructor() {
    this.x=W/2; this.y=H-100; this.spd=80;
    this.sliding=false; this.slideT=0; this.slideVX=0;
    this.jumping=false; this.jumpT=0; this.jumpDur=0; this.jumpPeak=0;
    this.crashAnim=false; this.crashT=0; this.crashAngle=0;
    this.parts=[];
  }

  get bounds() { return {x:this.x-PL_W/2,y:this.y-PL_H/2,w:PL_W,h:PL_H}; }
  get jumpH()  { return this.jumping?Math.sin(this.jumpT/this.jumpDur*Math.PI)*this.jumpPeak:0; }

  startJump(spd) {
    this.jumping=true; this.jumpT=0;
    const t=spd/MAX_SPD;
    this.jumpDur=0.4+t*1.0; this.jumpPeak=40+t*30;
  }

  update(dt, keys, road) {
    if (this.jumping) {
      this.jumpT+=dt;
      if (this.jumpT>=this.jumpDur){this.jumping=false;this.jumpT=0;}
      this.spd=Math.max(this.spd-40*dt,0); return;
    }
    const up=keys.has('ArrowUp')||keys.has('KeyW');
    const dn=keys.has('ArrowDown')||keys.has('KeyS');
    if (up)      this.spd=Math.min(this.spd+180*dt,MAX_SPD);
    else if (dn) this.spd=Math.max(this.spd-280*dt,0);
    else         this.spd=Math.max(this.spd-40*dt,0);

    if (this.sliding) {
      this.slideT-=dt;
      if (this.slideT<=0){this.sliding=false;this.slideVX=0;}
      let dx=0;
      if (keys.has('ArrowLeft')||keys.has('KeyA')) dx-=1;
      if (keys.has('ArrowRight')||keys.has('KeyD')) dx+=1;
      this.x+=dx*230*0.20*dt + this.slideVX*dt;
      this.slideVX*=Math.pow(0.08,dt);
    } else {
      let dx=0;
      if (keys.has('ArrowLeft')||keys.has('KeyA')) dx-=1;
      if (keys.has('ArrowRight')||keys.has('KeyD')) dx+=1;
      this.x+=dx*230*dt;
    }
    this.x=Math.max(PL_W/2+2, Math.min(W-PL_W/2-2, this.x));
  }

  updateCrash(dt) {
    if (!this.crashAnim) return;
    this.crashT+=dt;
    this.crashAngle=(this.crashT/1.4)*720;
    for (let i=this.parts.length-1;i>=0;i--) {
      const p=this.parts[i];
      p.life-=dt; if (p.life<=0){this.parts.splice(i,1);continue;}
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=180*dt; p.vx*=Math.pow(0.3,dt);
    }
    if (this.crashT>=1.4) this.crashAnim=false;
  }

  startCrash() { this.crashAnim=true; this.crashT=0; this.crashAngle=0; this._spawnParts(); }

  startSlide() {
    this.spd*=0.55; this.sliding=true; this.slideT=1.6;
    this.slideVX=(Math.random()*2-1)*110;
  }

  reset() {
    this.spd=80; this.sliding=false; this.slideT=0; this.slideVX=0;
    this.jumping=false; this.jumpT=0; this.crashAnim=false; this.parts=[]; this.x=W/2;
  }

  _spawnParts() {
    const cols=[[220,60,20],[255,200,0],[140,140,140],[60,60,60],[100,55,20]];
    for (let i=0;i<14;i++) {
      const a=Math.random()*Math.PI*2, s=60+Math.random()*180, l=0.5+Math.random()*0.8;
      this.parts.push({x:this.x+Math.random()*20-10,y:this.y+Math.random()*20-10,
        vx:Math.cos(a)*s, vy:Math.sin(a)*s-60, life:l, ml:l,
        col:cols[Math.floor(Math.random()*cols.length)]});
    }
  }

  draw(ctx, crashed) {
    for (const p of this.parts) {
      const al=p.life/p.ml;
      ctx.fillStyle=`rgba(${p.col[0]},${p.col[1]},${p.col[2]},${al*0.86})`;
      ctx.fillRect(p.x-4,p.y-4,8,8);
    }
    if (this.crashAnim) { this._drawCrashAnim(ctx); return; }
    if (crashed && Math.floor(Date.now()/150)%2===0) return;

    if (this.jumping) {
      const h=this.jumpH/this.jumpPeak, sc=1+h*0.6;
      ctx.fillStyle=`rgba(0,0,0,${(80*(1-h*0.55))/255})`;
      ellipse(ctx,this.x-(PL_W/2+4)*sc,this.y+PL_H/2-8-1,(PL_W+8)*sc,14); ctx.fill();
    }
    if (this.sliding) {
      ctx.strokeStyle='rgba(20,20,20,0.31)'; ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(this.x-4,this.y+PL_H/2);ctx.lineTo(this.x-6,this.y+PL_H/2+18);ctx.stroke();
      ctx.beginPath();ctx.moveTo(this.x+4,this.y+PL_H/2);ctx.lineTo(this.x+6,this.y+PL_H/2+18);ctx.stroke();
    }
    drawBuggy(ctx, this.x, this.y-this.jumpH, this.sliding?[180,160,40]:[220,185,55]);
  }

  _drawCrashAnim(ctx) {
    const p=this.crashT/1.4, sc=1+Math.sin(p*Math.PI)*0.55;
    ctx.save(); ctx.translate(this.x,this.y);
    ctx.rotate(this.crashAngle*Math.PI/180); ctx.scale(sc,sc);
    ctx.translate(-this.x,-this.y);
    drawBuggy(ctx,this.x,this.y,[220,80,40]);
    ctx.restore();
  }
}

function drawWheel(ctx,x,y) {
  ctx.fillStyle=rcol(22,22,22);  ellipse(ctx,x,y,11,16);    ctx.fill();
  ctx.fillStyle=rcol(48,48,48);  ellipse(ctx,x+1,y+1,9,4);  ctx.fill();
  ctx.fillStyle=rcol(48,48,48);  ellipse(ctx,x+1,y+11,9,4); ctx.fill();
  ctx.fillStyle=rcol(185,185,190);ellipse(ctx,x+2,y+3,7,10);ctx.fill();
  ctx.fillStyle=rcol(90,90,100); ellipse(ctx,x+4,y+6,3,4);  ctx.fill();
}

function drawBuggy(ctx,cx,cy,bc) {
  const bx=cx-PL_W/2, by=cy-PL_H/2;
  ctx.fillStyle=ac(bc,0.22); ellipse(ctx,bx-1,by+PL_H-8,PL_W+2,14); ctx.fill();
  drawWheel(ctx,bx-4,by+4); drawWheel(ctx,bx+PL_W-7,by+4);
  drawWheel(ctx,bx-4,by+PL_H-20); drawWheel(ctx,bx+PL_W-7,by+PL_H-20);

  const body=[[bx+8,by+2],[bx+PL_W-8,by+2],[bx+PL_W,by+11],
              [bx+PL_W,by+PL_H-13],[bx+PL_W-7,by+PL_H-2],
              [bx+7,by+PL_H-2],[bx,by+PL_H-13],[bx,by+11]];
  ctx.fillStyle=ri(bc); poly(ctx,body); ctx.fill();

  ctx.fillStyle=ri(lighten(bc,35));
  poly(ctx,[[bx+8,by+2],[bx+PL_W-8,by+2],[bx+PL_W-7,by+11],[bx+7,by+11]]); ctx.fill();

  ctx.fillStyle=ri(darken(bc,45));
  poly(ctx,[[bx+8,by+PL_H-11],[bx+PL_W-8,by+PL_H-11],[bx+PL_W-7,by+PL_H-2],[bx+7,by+PL_H-2]]); ctx.fill();

  ctx.fillStyle=rcol(70,130,200);
  poly(ctx,[[bx+9,by+11],[bx+PL_W-9,by+11],[bx+PL_W-10,by+22],[bx+10,by+22]]); ctx.fill();
  ctx.fillStyle='rgba(180,220,255,0.43)'; ellipse(ctx,bx+10,by+12,10,5); ctx.fill();

  ctx.fillStyle=rcol(28,28,33); ctx.fillRect(bx+11,by+22,PL_W-22,8);

  ctx.fillStyle=rcol(50,100,165);
  poly(ctx,[[bx+10,by+30],[bx+PL_W-10,by+30],[bx+PL_W-9,by+PL_H-11],[bx+9,by+PL_H-11]]); ctx.fill();

  ctx.fillStyle=ri(darken(bc,20));
  ctx.fillRect(bx-3,by+13,4,5); ctx.fillRect(bx+PL_W-1,by+13,4,5);

  ctx.fillStyle=rcol(255,252,185); ellipse(ctx,bx+7,by+1,8,5);    ctx.fill();
  ctx.fillStyle=rcol(255,252,185); ellipse(ctx,bx+PL_W-15,by+1,8,5); ctx.fill();
  ctx.fillStyle=rcol(210,20,20);   ellipse(ctx,bx+8,by+PL_H-6,7,4);  ctx.fill();
  ctx.fillStyle=rcol(210,20,20);   ellipse(ctx,bx+PL_W-15,by+PL_H-6,7,4); ctx.fill();

  ctx.strokeStyle='rgba(0,0,0,0.43)'; ctx.lineWidth=1; poly(ctx,body); ctx.stroke();
}

// ─── OSTACOLI ────────────────────────────────────────────────────────────────
const OBS_SIZES=[{w:42,h:30},{w:62,h:20},{w:24,h:34},{w:52,h:28},{w:58,h:32}];

class Obstacle {
  constructor(x,y,type){this.x=x;this.y=y;this.type=type;}
  get sz()     {return OBS_SIZES[this.type];}
  get bounds() {const s=this.sz;return{x:this.x-s.w/2,y:this.y-s.h/2,w:s.w,h:s.h};}
  get solid()  {return this.type<=2;}
  update(dt,spd){this.y+=spd*dt;}

  draw(ctx) {
    const b=this.bounds;
    if (this.type===0) drawRock(ctx,b);
    else if (this.type===1) drawLog(ctx,b);
    else if (this.type===2) drawBarrel(ctx,b);
    else if (this.type===3) drawPuddle(ctx,b);
    else drawOil(ctx,b);
  }
}

function drawRock(ctx,b) {
  ctx.fillStyle='rgba(0,0,0,0.22)'; ellipse(ctx,b.x+5,b.y+b.h-4,b.w,10); ctx.fill();
  ctx.fillStyle=rcol(92,87,78);
  poly(ctx,[[b.x+10,b.y+2],[b.x+b.w*2/3,b.y],[b.x+b.w-2,b.y+7],
            [b.x+b.w,b.y+b.h*2/3],[b.x+b.w-8,b.y+b.h],[b.x+b.w/3,b.y+b.h],[b.x,b.y+b.h/2]]); ctx.fill();
  ctx.fillStyle=rcol(138,132,120);
  poly(ctx,[[b.x+10,b.y+2],[b.x+24,b.y+1],[b.x+26,b.y+11],[b.x+14,b.y+13],[b.x+4,b.y+8]]); ctx.fill();
  ctx.fillStyle='rgba(55,52,46,0.71)'; ellipse(ctx,b.x+b.w/2,b.y+b.h/2,b.w/2,b.h/2); ctx.fill();
}

function drawLogEnd(ctx,x,y,h) {
  [[65,38,10],[148,94,38],[85,50,14],[172,116,50],[92,56,18],[202,152,76]].forEach(([r,g,bl],i)=>{
    const d=i*2; ctx.fillStyle=rcol(r,g,bl);
    ellipse(ctx,x+d,y+d,22-d*2,h-d*2); ctx.fill();
  });
}

function drawLog(ctx,b) {
  [[rcol(98,60,20),b.w-36,b.h],[rcol(148,94,36),b.w-36,b.h-8],[rcol(168,112,48),b.w-36,b.h/2-2]].forEach(([col,w,h],i)=>{
    ctx.fillStyle=col; ctx.fillRect(b.x+18,b.y+(i?i+1:0),w,h);
  });
  for (let dy=4;dy<b.h-1;dy+=4) {
    ctx.strokeStyle=dy%8===4?rcol(70,42,12):rcol(122,78,28); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(b.x+22,b.y+dy); ctx.lineTo(b.x+b.w-22,b.y+dy); ctx.stroke();
  }
  drawLogEnd(ctx,b.x,b.y,b.h); drawLogEnd(ctx,b.x+b.w-22,b.y,b.h);
}

function drawBarrel(ctx,b) {
  ctx.fillStyle=rcol(145,35,20); ctx.fillRect(b.x,b.y,b.w,b.h);
  const hw=Math.floor(b.w/3);
  ctx.fillStyle=rcol(205,60,38); ctx.fillRect(b.x+hw/2,b.y,hw*2,b.h);
  ctx.fillStyle=rcol(225,80,55); ctx.fillRect(b.x+hw,b.y+2,hw,b.h-4);
  [b.y+4,b.y+Math.floor(b.h/2)-2,b.y+b.h-9].forEach(by=>{
    ctx.fillStyle=rcol(65,58,44); ctx.fillRect(b.x,by,b.w,5);
    ctx.fillStyle=rcol(105,95,72); ctx.fillRect(b.x,by,b.w,2);
  });
  ctx.fillStyle=rcol(170,48,30); ellipse(ctx,b.x,b.y-3,b.w,9);   ctx.fill();
  ctx.fillStyle=rcol(200,65,45); ellipse(ctx,b.x+2,b.y-2,b.w-4,7); ctx.fill();
  ctx.fillStyle=rcol(225,90,60); ellipse(ctx,b.x+4,b.y-1,b.w-8,4); ctx.fill();
  ctx.fillStyle=rcol(120,28,15); ellipse(ctx,b.x,b.y+b.h-5,b.w,8); ctx.fill();
  const cx=b.x+b.w/2,my=b.y+b.h/2;
  ctx.fillStyle=rcol(55,48,36);  ellipse(ctx,cx-4,my-4,8,8); ctx.fill();
  ctx.fillStyle=rcol(95,85,64);  ellipse(ctx,cx-3,my-3,6,6); ctx.fill();
  ctx.fillStyle=rcol(130,118,90);ellipse(ctx,cx-1,my-2,3,3); ctx.fill();
}

function drawPuddle(ctx,b) {
  ctx.fillStyle='rgba(0,0,0,0.2)'; ellipse(ctx,b.x+4,b.y+4,b.w,b.h); ctx.fill();
  [[18,45,100,0.92],[32,68,148,0.82],[50,95,185,0.73],[72,118,210,0.61]].forEach(([r,g,bl,a],i)=>{
    ctx.fillStyle=`rgba(${r},${g},${bl},${a})`; ellipse(ctx,b.x+i*3,b.y+i*2,b.w-i*6,b.h-i*4); ctx.fill();
  });
  ctx.fillStyle='rgba(115,175,240,0.47)'; ellipse(ctx,b.x+5,b.y+2,b.w*3/5,b.h/2); ctx.fill();
  ctx.fillStyle='rgba(210,235,255,0.78)'; ellipse(ctx,b.x+8,b.y+3,b.w/5,b.h/4);   ctx.fill();
  ctx.fillStyle='rgba(245,250,255,0.90)'; ellipse(ctx,b.x+10,b.y+4,b.w/9,b.h/6);  ctx.fill();
}

function drawOil(ctx,b) {
  ctx.fillStyle='rgba(12,10,14,0.94)';
  ellipse(ctx,b.x,b.y,b.w,b.h);           ctx.fill();
  ellipse(ctx,b.x+6,b.y-3,b.w-8,b.h+2);  ctx.fill();
  ellipse(ctx,b.x-4,b.y+2,b.w-6,b.h-4);  ctx.fill();
}

// ─── FLAG CHECKPOINT ─────────────────────────────────────────────────────────
class Flag {
  constructor(road,y) {
    const e=road.edges(); this.rl=e.l; this.rr=e.r; this.y=y;
    this.col=hsvToRgb(Math.random()*360,0.9,1);
  }
  get gate() {return{x:this.rl+12,y:this.y-20,w:this.rr-this.rl-24,h:40};}
  update(dt,spd){this.y+=spd*dt;}
  draw(ctx) {
    const lx=this.rl+10, rx=this.rr-10, iy=this.y, col=ri(this.col);
    ctx.strokeStyle='white'; ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(lx,iy-44);ctx.lineTo(lx,iy+10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx,iy-44);ctx.lineTo(rx,iy+10);ctx.stroke();
    ctx.fillStyle=col; ctx.fillRect(lx+2,iy-42,rx-lx-4,18);
    ctx.strokeStyle='black'; ctx.lineWidth=1; ctx.strokeRect(lx+2,iy-42,rx-lx-4,18);
    ctx.fillStyle=col; poly(ctx,[[lx,iy-44],[lx+18,iy-35],[lx,iy-26]]); ctx.fill();
  }
}

// ─── BONUS FLAG ──────────────────────────────────────────────────────────────
const BF = {
  PTS:[100,200,300,400,500], BONUS:[1000,2000,3000,4000,5000],
  W:[40,25,18,12,5], PH:24,
  COL:['rgb(220,50,50)','rgb(240,240,240)','rgb(155,55,200)','rgb(45,105,220)','rgb(35,175,60)'],
  NAME:['ROSSO','BIANCO','VIOLA','BLU','VERDE']
};

class BonusFlag {
  constructor(x,y,t){this.x=x;this.y=y;this.t=t;}
  get bounds(){return{x:this.x,y:this.y-BF.PH-2,w:14,h:13};}
  update(dt,spd){this.y+=spd*dt;}
  draw(ctx) {
    const px=this.x,py=this.y,ph=BF.PH,tc=BF.COL[this.t];
    ctx.fillStyle='rgba(0,0,0,0.16)'; ellipse(ctx,px-3,py+2,10,6); ctx.fill();
    ctx.fillStyle=rcol(80,80,80); ctx.fillRect(px-1,py-ph,2,ph+4);
    if (this.t>=3) { ctx.fillStyle=this.t===3?'rgba(45,105,220,0.18)':'rgba(155,55,200,0.18)'; ellipse(ctx,px-10,py-ph-6,34,26); ctx.fill(); }
    ctx.fillStyle=tc; poly(ctx,[[px+1,py-ph],[px+15,py-ph+6],[px+1,py-ph+12]]); ctx.fill();
    ctx.strokeStyle=rcol(70,70,70); ctx.lineWidth=1; poly(ctx,[[px+1,py-ph],[px+15,py-ph+6],[px+1,py-ph+12]]); ctx.stroke();
  }
}

// ─── BUMPER ──────────────────────────────────────────────────────────────────
class Bumper {
  constructor(x,y){this.x=x;this.y=y;}
  get bounds(){return{x:this.x-26,y:this.y-11,w:52,h:22};}
  update(dt,spd){this.y+=spd*dt;}
  draw(ctx) {
    const b=this.bounds;
    ctx.fillStyle='rgba(0,0,0,0.22)'; ellipse(ctx,b.x+3,b.y+b.h-4,b.w,10); ctx.fill();
    const ramp=[[b.x,b.y+b.h],[b.x+b.w,b.y+b.h],[b.x+b.w-10,b.y],[b.x+10,b.y]];
    ctx.fillStyle=rcol(255,215,20); poly(ctx,ramp); ctx.fill();
    ctx.fillStyle=rcol(230,95,0);
    poly(ctx,[[b.x+12,b.y+b.h],[b.x+26,b.y+b.h],[b.x+b.w-16,b.y],[b.x+b.w-30,b.y]]); ctx.fill();
    ctx.strokeStyle=rcol(190,120,0); ctx.lineWidth=2; poly(ctx,ramp); ctx.stroke();
    const cx=b.x+b.w/2;
    ctx.strokeStyle='white'; ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx,b.y+3);ctx.lineTo(cx,b.y+b.h-5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,b.y+3);ctx.lineTo(cx-5,b.y+10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,b.y+3);ctx.lineTo(cx+5,b.y+10);ctx.stroke();
  }
}

// ─── ENGINE DI GIOCO ─────────────────────────────────────────────────────────
class Engine {
  constructor(aud) {
    this.aud=aud;
    this.road=null; this.player=null; this.rng=null;
    this.obs=[]; this.flags=[]; this.bumpers=[]; this.bflags=[];
    this.score=0; this.lives=3; this.phase=PH.PLAY; this.diff=1;
    this.cpTimer=0; this.cpExpired=false; this.dist=0;
    this.nextObs=200; this.nextFlag=3500; this.nextBump=1000; this.nextBF=180;
    this.crashT=0; this.bonusT=0; this.bonusTxt=null; this.bonusCol=null;
    this.fcnt=[0,0,0,0,0];
  }

  get cpLimit() { return this.diff===2?60:this.diff===3?45:this.diff===4?30:0; }

  reset(diff=1) {
    this.diff=Math.max(1,Math.min(4,diff));
    this.score=0; this.lives=3; this.phase=PH.PLAY;
    this.cpExpired=false; this.cpTimer=this.cpLimit; this.dist=0;
    this.nextObs=200; this.nextFlag=3500; this.nextBump=1000; this.nextBF=180;
    this.bonusT=0; this.bonusTxt=null; this.fcnt=[0,0,0,0,0];
    this.obs=[]; this.flags=[]; this.bumpers=[]; this.bflags=[];
    this.rng=lcg(Date.now());
    this.road=new Road(this.rng);
    this.player=new Player();
    this.aud.startEngine();
  }

  update(dt, keys) {
    if (this.phase===PH.OVER) return;
    if (this.phase===PH.CRASH) {
      this.player.updateCrash(dt);
      this.crashT-=dt;
      if (this.crashT<=0) {
        this.phase=this.lives>0?PH.PLAY:PH.OVER;
        if (this.phase===PH.PLAY) {
          this.player.reset();
          this.aud.startEngine();
          if (this.cpExpired) this.cpTimer=this.cpLimit;
          this.cpExpired=false;
        }
      }
      return;
    }
    if (this.diff>1) {
      const prev=this.cpTimer;
      this.cpTimer-=dt;
      if (this.cpTimer<=0){this.cpExpired=true;this._crash();return;}
      if (this.cpTimer<=5 && Math.floor(prev)!==Math.floor(this.cpTimer)) this.aud.playTick();
    }
    if (this.bonusT>0){this.bonusT-=dt;if(this.bonusT<=0)this.bonusTxt=null;}

    const spd=this.player.spd;
    this.dist+=spd*dt;
    this.aud.updateSpeed(spd);
    this.road.update(dt,spd);
    this.player.update(dt,keys,this.road);
    this.score+=Math.floor(spd*dt*0.06);

    this._spawn();
    this._updateEnts(dt,spd);
    this._collide();
  }

  _spawn() {
    if (this.dist>=this.nextObs) {
      const {l,r}=this.road.edgesAt(-60);
      const x=l+22+this.rng()*(r-l-44);
      const rv=this.rng();
      const t=rv<0.22?0:rv<0.44?1:rv<0.55?2:rv<0.78?3:4;
      this.obs.push(new Obstacle(x,-60,t));
      const gap=Math.max(70,240-this.dist*0.0015);
      this.nextObs=this.dist+gap*(0.7+this.rng()*0.6);
    }
    if (this.dist>=this.nextFlag) {
      this.flags.push(new Flag(this.road,-120));
      this.nextFlag=this.dist+4500+this.rng()*4000;
    }
    if (this.dist>=this.nextBump) {
      const {l,r}=this.road.edgesAt(-60);
      this.bumpers.push(new Bumper(l+30+this.rng()*(r-l-60),-60));
      this.nextBump=this.dist+1800+this.rng()*2200;
    }
    if (this.dist>=this.nextBF) {
      const rv=this.rng()*100; let acc=0,t=0;
      for (let i=0;i<BF.W.length;i++){acc+=BF.W[i];if(rv<acc){t=i;break;}}
      const {l,r}=this.road.edgesAt(-60);
      this.bflags.push(new BonusFlag(l+20+this.rng()*(r-l-40),-60,t));
      this.nextBF=this.dist+250+this.rng()*350;
    }
  }

  _updateEnts(dt,spd) {
    const cull=H+80;
    this.obs=this.obs.filter(e=>{e.update(dt,spd);return e.y<cull;});
    this.flags=this.flags.filter(e=>{e.update(dt,spd);return e.y<cull;});
    this.bumpers=this.bumpers.filter(e=>{e.update(dt,spd);return e.y<cull;});
    this.bflags=this.bflags.filter(e=>{e.update(dt,spd);return e.y<cull;});
  }

  _collide() {
    if (this.player.jumping) return;
    const pb=this.player.bounds;
    if (!this.road.onRoad(pb)){this._crash();return;}

    for (let i=this.bumpers.length-1;i>=0;i--) {
      if (!rectsHit(this.bumpers[i].bounds,pb)) continue;
      this.player.startJump(this.player.spd); this.aud.playJump(); this.bumpers.splice(i,1); return;
    }
    for (let i=this.obs.length-1;i>=0;i--) {
      const o=this.obs[i];
      if (!rectsHit(o.bounds,pb)) continue;
      if (o.solid){this._crash();return;}
      else if (!this.player.sliding) {
        this.player.startSlide();
        o.type===3?this.aud.playSplash():this.aud.playSlide();
        this.obs.splice(i,1);
      }
    }
    for (let i=this.flags.length-1;i>=0;i--) {
      if (rectsHit(this.flags[i].gate,pb)) {
        this.score+=500; this.aud.playCheckpoint();
        this.cpTimer=this.cpLimit; this.flags.splice(i,1);
      }
    }
    for (let i=this.bflags.length-1;i>=0;i--) {
      if (!rectsHit(this.bflags[i].bounds,pb)) continue;
      this._collectBF(this.bflags[i].t); this.bflags.splice(i,1);
    }
  }

  _collectBF(t) {
    this.score+=BF.PTS[t]; this.fcnt[t]++;
    if (this.fcnt[t]>=5) {
      this.fcnt[t]=0; this.score+=BF.BONUS[t];
      this.bonusTxt=`+${BF.BONUS[t].toLocaleString()}  BONUS ${BF.NAME[t]}!`;
      this.bonusCol=BF.COL[t]; this.bonusT=2.5; this.aud.playBonus();
    } else this.aud.playCollect();
  }

  _crash() {
    this.lives--; this.phase=PH.CRASH; this.crashT=2.0;
    this.obs=[]; this.player.startCrash();
    this.aud.stopEngine(); this.aud.playCrash();
  }

  draw(ctx) {
    this.road.draw(ctx);
    for (const e of this.flags)   e.draw(ctx);
    for (const e of this.bumpers) e.draw(ctx);
    for (const e of this.bflags)  e.draw(ctx);
    for (const e of this.obs)     e.draw(ctx);
    this.player.draw(ctx, this.phase===PH.CRASH);
    this._hud(ctx);
  }

  _hud(ctx) {
    ctx.textBaseline='top';
    ctx.font='bold 22px monospace';
    ctx.fillStyle='white'; ctx.textAlign='left';
    ctx.fillText(`SCORE  ${String(this.score).padStart(6,'0')}`, 10, 8);

    ctx.textAlign='right';
    ctx.fillText(`${'♥'.repeat(Math.max(0,this.lives))}`, W-10, 8);

    if (this.diff>1 && this.phase!==PH.OVER) {
      const t=Math.max(0,this.cpTimer);
      ctx.fillStyle=t<=5?'rgb(255,80,80)':t<=15?'rgb(255,200,0)':'white';
      ctx.textAlign='center'; ctx.font='bold 20px monospace';
      ctx.fillText(`TEMPO ${Math.ceil(t)}`, W/2, 8);
    }

    // Bandierine bonus
    const tierCols=['#e03232','#f0f0f0','#9b37c8','#2d69dc','#23af3c'];
    for (let i=0;i<5;i++) {
      ctx.fillStyle=tierCols[i]; ctx.textAlign='left'; ctx.font='bold 12px monospace';
      const c=this.fcnt[i];
      ctx.fillText(`${'★'.repeat(c)}${'☆'.repeat(5-c)}`, 10, H-90+i*16);
    }

    // Velocità
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='12px monospace'; ctx.textAlign='right';
    ctx.fillText(`${Math.round(this.player.spd/MAX_SPD*200)} km/h`, W-10, H-20);

    // Difficoltà
    const dnames=['','FACILE','NORMALE','DIFFICILE','ESPERTO'];
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.textAlign='center'; ctx.font='12px monospace';
    ctx.fillText(dnames[this.diff], W/2, H-20);

    // Bonus testo
    if (this.bonusTxt) {
      ctx.fillStyle=this.bonusCol; ctx.textAlign='center'; ctx.font='bold 24px monospace';
      ctx.fillText(this.bonusTxt, W/2, H/2-50);
    }

    // Game over
    if (this.phase===PH.OVER) {
      ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,H/2-70,W,130);
      ctx.fillStyle='rgb(220,50,50)'; ctx.font='bold 52px monospace'; ctx.textAlign='center';
      ctx.fillText('GAME OVER', W/2, H/2-50);
      ctx.fillStyle='white'; ctx.font='18px monospace';
      ctx.fillText(`Punteggio: ${String(this.score).padStart(6,'0')}`, W/2, H/2+5);
      ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='16px monospace';
      ctx.fillText('INVIO per continuare', W/2, H/2+35);
    }
  }
}

// ─── HIGHSCORE ───────────────────────────────────────────────────────────────
function loadHS() {
  try { const d=JSON.parse(localStorage.getItem(HS_KEY)||'{}');
    const o={}; for(let i=1;i<=4;i++) o[i]=(d[i]||[]).slice(0,10); return o; }
  catch(e){return{1:[],2:[],3:[],4:[]};}
}
function saveHS(hs) { localStorage.setItem(HS_KEY,JSON.stringify(hs)); }
function isTop(hs,diff,score) { const l=hs[diff]||[]; return l.length<10||score>l[l.length-1].score; }
function addScore(hs,diff,name,score) {
  const l=hs[diff]||[];
  l.push({name,score,date:new Date().toLocaleDateString('it-IT')});
  l.sort((a,b)=>b.score-a.score); hs[diff]=l.slice(0,10); saveHS(hs);
}

function drawHSScreen(ctx, hs, diff) {
  ctx.fillStyle='rgb(12,12,28)'; ctx.fillRect(0,0,W,H);

  // Titolo
  ctx.textBaseline='top';
  ctx.fillStyle='rgb(255,200,0)'; ctx.font='bold 46px monospace'; ctx.textAlign='center';
  ctx.fillText('BUGGY BOY', W/2, 28);

  const dnames=['','FACILE','NORMALE','DIFFICILE','ESPERTO'];
  ctx.fillStyle='rgb(255,230,80)'; ctx.font='bold 15px monospace';
  ctx.fillText(`── CLASSIFICA  ${dnames[diff]} ──`, W/2, 88);

  const list=hs[diff]||[];
  for (let i=0;i<10;i++) {
    const e=list[i], y=120+i*36;
    ctx.fillStyle=i===0?'rgb(255,210,0)':i===1?'rgb(192,192,192)':i===2?'rgb(180,100,40)':'rgb(190,190,210)';
    ctx.font='16px monospace'; ctx.textAlign='left';  ctx.fillText(`${i+1}.`, 55, y);
    ctx.textAlign='left';  ctx.fillText(e?e.name.trim():'---', 88, y);
    ctx.textAlign='right'; ctx.fillText(e?String(e.score).padStart(6,'0'):'------', W-55, y);
    if (e) { ctx.fillStyle='rgba(140,140,160,0.8)'; ctx.font='11px monospace'; ctx.fillText(e.date,W-55,y+18); }
  }

  // Puntini di selezione difficoltà
  for (let i=0;i<4;i++) {
    ctx.fillStyle=(i+1)===diff?'rgb(255,200,0)':'rgb(60,60,80)';
    ctx.font='18px monospace'; ctx.textAlign='center';
    ctx.fillText('●', W/2-30+i*22, H-62);
  }

  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='13px monospace'; ctx.textAlign='center';
  ctx.fillText('[1] Facile  [2] Normale  [3] Difficile  [4] Esperto', W/2, H-38);
  ctx.fillText('[R] Azzera  [ESC] Esci', W/2, H-16);
}

function drawNameScreen(ctx, name, score) {
  ctx.fillStyle='rgb(12,12,28)'; ctx.fillRect(0,0,W,H);
  ctx.textBaseline='top';
  ctx.fillStyle='rgb(255,200,0)'; ctx.font='bold 34px monospace'; ctx.textAlign='center';
  ctx.fillText('NUOVO RECORD!', W/2, 150);
  ctx.fillStyle='white'; ctx.font='22px monospace';
  ctx.fillText(`Punteggio: ${String(score).padStart(6,'0')}`, W/2, 204);
  ctx.fillStyle='rgb(160,210,255)'; ctx.font='16px monospace';
  ctx.fillText('Inserisci il tuo nome (3 caratteri):', W/2, 268);

  ctx.strokeStyle='rgb(255,200,0)'; ctx.lineWidth=2;
  ctx.strokeRect(W/2-72,294,144,52);
  ctx.fillStyle='rgb(22,22,50)'; ctx.fillRect(W/2-70,296,140,48);
  ctx.fillStyle='white'; ctx.font='bold 34px monospace';
  ctx.fillText((name+'___').slice(0,3), W/2, 300);

  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='13px monospace';
  ctx.fillText('Lettere/Numeri per scrivere, BACKSPACE per cancellare', W/2, 376);
  ctx.fillText('INVIO per confermare', W/2, 396);
}

// ─── LOOP PRINCIPALE ─────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const aud    = new Audio();
const keys   = new Set();

let appSt   = ST.HS;
let hs      = loadHS();
let cycleDiff = 1, cycleT = 0;
let eng     = null;
let pendScore = 0, pendDiff = 1, entName = '';

document.addEventListener('keydown', e => {
  // Previeni scroll pagina con frecce
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys.add(e.code);
  onKey(e);
});
document.addEventListener('keyup', e => keys.delete(e.code));

function onKey(e) {
  if (appSt===ST.HS) {
    if (e.key>='1'&&e.key<='4') {
      aud._init();
      eng=new Engine(aud); eng.reset(parseInt(e.key)); appSt=ST.PLAY;
    }
    if (e.key==='r'||e.key==='R') { hs={1:[],2:[],3:[],4:[]}; saveHS(hs); }
    if (e.key==='Escape') { /* noop in browser */ }
  }
  else if (appSt===ST.PLAY) {
    if (eng&&eng.phase===PH.OVER&&e.code==='Enter') {
      aud.stopEngine();
      if (isTop(hs,eng.diff,eng.score)) {
        pendScore=eng.score; pendDiff=eng.diff; entName=''; appSt=ST.NAME;
      } else appSt=ST.HS;
    }
  }
  else if (appSt===ST.NAME) {
    if (e.code==='Enter'&&entName.length>0) {
      const name=(entName+'   ').slice(0,3).toUpperCase();
      addScore(hs,pendDiff,name,pendScore);
      cycleDiff=pendDiff; appSt=ST.HS;
    } else if (e.code==='Backspace') {
      entName=entName.slice(0,-1);
    } else if (entName.length<3&&/^[a-zA-Z0-9]$/.test(e.key)) {
      entName+=e.key.toUpperCase();
    }
  }
}

let lastTs=null;
function loop(ts) {
  const dt=lastTs?Math.min((ts-lastTs)/1000,0.05):0.016;
  lastTs=ts;

  if (appSt===ST.HS) {
    cycleT+=dt;
    if (cycleT>=4){cycleT=0;cycleDiff=cycleDiff%4+1;}
    drawHSScreen(ctx,hs,cycleDiff);
  } else if (appSt===ST.PLAY) {
    if (eng){eng.update(dt,keys);eng.draw(ctx);}
  } else if (appSt===ST.NAME) {
    drawNameScreen(ctx,entName,pendScore);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
